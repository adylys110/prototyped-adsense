<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | InsightDaily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">InsightDaily.</a>
        <nav id="mainNav"><a href="index.html">Home</a><a href="about.html">About</a></nav>
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
    <span></span><span></span><span></span>
  </button>
</header>

    <div class="container" style="grid-template-columns: 1fr; max-width: 600px;">
        <main class="article-wrapper">
            <h1 class="article-title" style="font-size: 2rem;">Get in Touch</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Have a tip, feedback, or business inquiry? Fill out the form below.</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </main>
    </div>

  <script>
    (function() {
      var toggle = document.getElementById('menuToggle');
      var nav = document.getElementById('mainNav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', function() {
        var isOpen = nav.classList.toggle('open');
        toggle.classList.toggle('open');
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });
      nav.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          nav.classList.remove('open');
          toggle.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
    })();
  </script>
</body>
</html>
